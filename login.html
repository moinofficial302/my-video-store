<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AKANS</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================
   RESET + FONTS
========================= */
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* =========================
   BODY
========================= */
body {
  min-height: 100vh;
  background: linear-gradient(145deg, #eef6ff 0%, #f5f0ff 50%, #ffffff 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 30px 16px;
  overflow-x: hidden;
  position: relative;
}

/* =========================
   FLOATING BG ORBS
========================= */
.bg-particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }

.particle {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: floatOrb ease-in-out infinite alternate;
}
.p1 { width:300px; height:300px; background:radial-gradient(circle,#93c5fd,transparent); top:-100px; left:-80px; animation-duration:9s; opacity:0.5; }
.p2 { width:250px; height:250px; background:radial-gradient(circle,#c4b5fd,transparent); top:25%; right:-80px; animation-duration:12s; animation-delay:-4s; opacity:0.45; }
.p3 { width:220px; height:220px; background:radial-gradient(circle,#bfdbfe,transparent); bottom:5%; left:-60px; animation-duration:14s; animation-delay:-7s; opacity:0.4; }
.p4 { width:180px; height:180px; background:radial-gradient(circle,#ddd6fe,transparent); bottom:20%; right:-40px; animation-duration:10s; animation-delay:-2s; opacity:0.4; }

@keyframes floatOrb {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(20px,-25px) scale(1.1); }
}

/* =========================
   TOAST
========================= */
.toast {
  position: fixed; top:20px; left:50%;
  transform: translateX(-50%) translateY(-20px);
  background: #1e1e2e; color:#fff;
  padding: 12px 22px; border-radius:30px;
  font-size:14px; font-weight:600;
  z-index:9999; opacity:0;
  transition: all 0.35s ease;
  white-space:nowrap;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
  pointer-events:none;
}
.toast.show   { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.hidden { display:none; }
.toast.success { background:linear-gradient(to right,#11998e,#38ef7d); }
.toast.error   { background:linear-gradient(to right,#ff416c,#ff4b2b); }
.toast.info    { background:linear-gradient(to right,#2563eb,#38bdf8); }
.toast.warn    { background:linear-gradient(to right,#f7971e,#ffd200); color:#1e1e2e; }

/* =========================
   AUTH WRAPPER
========================= */
.auth-wrapper {
  width: 100%;
  max-width: 380px;
  position: relative;
  z-index: 1;
  animation: wrapperIn 0.65s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes wrapperIn {
  from { opacity:0; transform:translateY(35px); }
  to   { opacity:1; transform:translateY(0); }
}

/* =========================
   LOGO SECTION
========================= */
.logo-section {
  text-align: center;
  margin-bottom: 24px;
  animation: logoIn 0.75s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
}
@keyframes logoIn {
  from { opacity:0; transform:scale(0.65) translateY(-15px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.logo-ring {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  padding: 4px;
  background: conic-gradient(#facc15 0deg,#f59e0b 90deg,#facc15 180deg,#f59e0b 270deg,#facc15 360deg);
  box-shadow: 0 0 0 3px rgba(250,204,21,0.2), 0 0 28px rgba(250,204,21,0.3), 0 16px 40px rgba(0,0,0,0.15);
  animation: ringPulse 3s ease-in-out infinite alternate;
  overflow: hidden;
  flex-shrink: 0;
}
@keyframes ringPulse {
  from { box-shadow: 0 0 0 3px rgba(250,204,21,0.15), 0 0 20px rgba(250,204,21,0.2), 0 16px 40px rgba(0,0,0,0.12); }
  to   { box-shadow: 0 0 0 4px rgba(250,204,21,0.40), 0 0 45px rgba(250,204,21,0.4), 0 16px 40px rgba(0,0,0,0.12); }
}

.logo-img {
  width: 92px !important;
  height: 92px !important;
  max-width: 92px !important;
  max-height: 92px !important;
  min-width: 92px !important;
  min-height: 92px !important;
  border-radius: 50% !important;
  object-fit: cover !important;
  display: block !important;
  background: #fff;
  flex-shrink: 0 !important;
}

.brand-name {
  font-family: 'Nunito', sans-serif;
  font-size: 22px; font-weight: 900;
  background: linear-gradient(135deg, #1e90ff, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-top: 14px;
  letter-spacing: 0.3px;
}

.brand-tagline {
  font-size: 11px;
  color: #888;
  margin-top: 4px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
}

/* =========================
   AUTH CARD
========================= */
.auth-card {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 26px;
  padding: 22px 18px 24px;
  box-shadow:
    0 20px 50px rgba(0,0,0,0.10),
    0 4px 12px rgba(0,0,0,0.06),
    inset 0 0 0 1.5px rgba(255,255,255,0.9);
  position: relative;
  overflow: hidden;
  animation: cardIn 0.65s cubic-bezier(0.22,1,0.36,1) 0.3s both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(25px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.card-shimmer {
  position: absolute; inset:-60%;
  background: linear-gradient(115deg, transparent 30%, rgba(79,172,254,0.05) 50%, transparent 70%);
  animation: shimmerMove 8s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmerMove {
  0%   { transform: translateX(-80%) rotate(12deg); }
  50%  { transform: translateX(80%)  rotate(12deg); }
  100% { transform: translateX(-80%) rotate(12deg); }
}

/* =========================
   TABS
========================= */
.auth-tabs {
  display: flex; gap:5px;
  margin-bottom: 20px;
  background: #e8eef8;
  border-radius: 14px; padding: 4px;
}

.tab {
  flex:1; border:none;
  border-radius: 10px;
  padding: 11px 0;
  font-family: 'Poppins', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  color: #888;
  background: transparent;
  transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items:center; justify-content:center; gap:5px;
}

.tab.active {
  background: linear-gradient(135deg, #1e90ff, #00c6ff);
  color: #fff;
  box-shadow: 0 5px 18px rgba(30,144,255,0.35);
  transform: scale(1.03);
}

.tab:not(.active):hover {
  color: #555;
  background: rgba(30,144,255,0.06);
}

/* =========================
   FORM BOX
========================= */
.form-box { display:flex; flex-direction:column; gap:11px; }
.form-box.hidden { display:none; }

.form-enter {
  animation: formIn 0.32s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes formIn {
  from { opacity:0; transform:translateX(14px); }
  to   { opacity:1; transform:translateX(0); }
}

/* =========================
   INPUT GROUPS
========================= */
.input-group {
  position: relative;
  display: flex; align-items:center;
  border: 1.5px solid #d0ddf0;
  border-radius: 13px;
  background: #f0f6ff;
  transition: border-color 0.22s, background 0.22s, box-shadow 0.22s;
  overflow: hidden;
}

.input-group.focused {
  border-color: #1e90ff;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(30,144,255,0.10), 0 4px 14px rgba(0,0,0,0.06);
}

.input-icon {
  font-size: 16px;
  padding: 0 4px 0 14px;
  flex-shrink: 0;
  opacity: 0.7;
}

.input-group input {
  flex:1;
  padding: 13px 10px 13px 8px;
  border:none;
  background: transparent;
  color: #111827;
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  outline: none;
  min-width: 0;
  -webkit-text-fill-color: #111827;
}
.input-group input::placeholder {
  color: #8fa3bc;
  -webkit-text-fill-color: #8fa3bc;
  opacity: 1;
}
.input-group input:-webkit-autofill {
  -webkit-box-shadow: 0 0 0 100px #f0f6ff inset;
  -webkit-text-fill-color: #111827 !important;
}

.eye-toggle {
  font-size:17px; padding:0 14px 0 6px;
  cursor:pointer; opacity:0.45; flex-shrink:0;
  user-select:none; transition:opacity 0.2s;
}
.eye-toggle:hover { opacity:0.85; }

/* =========================
   PASSWORD STRENGTH
========================= */
.strength-wrap {
  display:none; align-items:center; gap:10px; padding:0 2px;
  animation: fadeIn 0.3s ease;
}
.strength-bar {
  flex:1; height:5px; background:#e0e7f0;
  border-radius:4px; overflow:hidden;
}
.strength-fill {
  height:100%; width:0%;
  border-radius:4px;
  transition: width 0.4s ease, background 0.4s ease;
}
.strength-label {
  font-size:11px; font-weight:700;
  white-space:nowrap; min-width:75px; text-align:right;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* =========================
   PRIMARY BUTTON
========================= */
.primary-btn {
  border:none; border-radius:13px;
  padding: 14px 0;
  font-family:'Poppins',sans-serif;
  font-size:15px; font-weight:700;
  color:#fff;
  background: linear-gradient(135deg, #1e90ff, #00c6ff);
  cursor:pointer;
  box-shadow: 0 8px 22px rgba(30,144,255,0.35);
  transition: all 0.22s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  position:relative; overflow:hidden;
}
.primary-btn::after {
  content:''; position:absolute; top:0; left:-100%;
  width:55%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
  transition: left 0.38s ease;
}
.primary-btn:hover::after { left:150%; }
.primary-btn:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(30,144,255,0.45); }
.primary-btn:active { transform:scale(0.97); }
.primary-btn:disabled { opacity:0.58; cursor:not-allowed; transform:none; }

.signup-btn {
  background: linear-gradient(135deg, #a78bfa, #1e90ff);
  box-shadow: 0 8px 22px rgba(167,139,250,0.35);
}
.signup-btn:hover { box-shadow:0 12px 28px rgba(167,139,250,0.45); }

/* =========================
   DIVIDER
========================= */
.divider {
  display:flex; align-items:center; gap:10px;
  color:#bbb; font-size:11px; font-weight:600;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px; background:#e0e7f0;
}

/* =========================
   GOOGLE BUTTON
========================= */
.google-btn {
  border: 1.5px solid #d0ddf0;
  border-radius:13px; padding:13px 0;
  font-family:'Poppins',sans-serif;
  font-size:14px; font-weight:600;
  color:#333;
  background: #ffffff;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition: all 0.22s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.google-btn:hover {
  background: #f8faff;
  border-color: #1e90ff;
  transform:translateY(-1px);
  box-shadow: 0 6px 18px rgba(30,144,255,0.12);
}
.google-btn:active { transform:scale(0.97); }
.google-icon { width:20px; height:20px; flex-shrink:0; }

/* =========================
   SPINNER
========================= */
.btn-spinner {
  width:16px; height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff; border-radius:50%;
  animation:spin 0.7s linear infinite;
}
.hidden { display:none !important; }
@keyframes spin { to{transform:rotate(360deg)} }

/* =========================
   TERMS
========================= */
.terms-text {
  font-size:12px; color:#aaa;
  text-align:center; line-height:1.5;
}
.terms-link { color:#1e90ff; text-decoration:none; font-weight:600; }
.terms-link:hover { text-decoration:underline; }

/* =========================
   FOOTER
========================= */
.footer-text {
  text-align:center; margin-top:18px;
  font-size:12px; color:#aaa;
  letter-spacing:0.4px;
  animation: fadeIn 1s ease 0.8s both;
}

/* =========================
   ACCOUNT PAGE (compatibility)
========================= */
.account-wrap { width:100%; padding:14px; box-sizing:border-box; }

.profile-card {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(135deg,#fff,#f9fafb);
  border-radius:20px; padding:16px 18px;
  box-shadow:0 12px 30px rgba(0,0,0,.10);
}
.profile-text { display:flex; flex-direction:column; }
.profile-text h3 { font-size:18px; font-weight:700; color:#111827; }
.profile-text p  { margin-top:4px; font-size:14px; color:#6b7280; }
.profile-logo { width:56px; height:56px; min-width:56px; border-radius:50%; object-fit:contain; }

.wallet-card {
  width:100%; margin:18px 0;
  background:linear-gradient(135deg,#1e90ff,#00c6ff);
  color:#fff; border-radius:22px; padding:18px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 14px 35px rgba(30,144,255,.35);
}
.wallet-card span { font-size:15px; font-weight:600; }
.wallet-card h2   { font-size:26px; font-weight:800; }

.menu-list { width:100%; margin-top:16px; }
.menu-item {
  display:flex; align-items:center; padding:16px 18px;
  font-size:15px; font-weight:500; cursor:pointer;
  background:#fff; border-radius:14px; margin-bottom:10px;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
  transition:background .2s, transform .1s;
}
.menu-item:active { background:#f3f4f6; transform:scale(.98); }
.menu-item::after { content:"›"; margin-left:auto; font-size:22px; color:#facc15; font-weight:700; }
.menu-item.logout { color:#e53935; font-weight:700; background:#fff5f5; }
.menu-item:last-child { margin-bottom:0; }

/* =========================
   RESPONSIVE
========================= */
@media(max-width:380px) {
  .brand-name { font-size:18px; }
  .logo-ring  { width:84px !important; height:84px !important; }
  .logo-img   { width:76px !important; height:76px !important; max-width:76px !important; max-height:76px !important; min-width:76px !important; min-height:76px !important; }
  .auth-card  { padding:18px 14px; }
}
</style>

</head>
<body>

<!-- 🔔 TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- 🫧 BG ORBS -->
<div class="bg-particles">
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
</div>

<div class="auth-wrapper">

  <!-- 🦅 LOGO -->
  <div class="logo-section">
    <div class="logo-ring">
      <img
        src="assets/logo.png"
        alt="Only M7"
        class="logo-img"
        width="92"
        height="92"
      />
    </div>
    <h1 class="brand-name">Only M.7 Limited</h1>
    <p class="brand-tagline">Premium Digital Platform</p>
  </div>

  <!-- 📦 AUTH CARD -->
  <div class="auth-card">
    <div class="card-shimmer"></div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button id="loginTab" class="tab active" type="button">🔑 Login</button>
      <button id="signupTab" class="tab" type="button">✨ Sign Up</button>
    </div>

    <!-- ===== LOGIN FORM ===== -->
    <div id="loginForm" class="form-box">

      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" id="loginIdentifier" placeholder="Username or Email" autocomplete="username"/>
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password"/>
        <span class="eye-toggle" id="eyeLogin">👁️</span>
      </div>

      <button class="primary-btn" id="loginBtn" type="button">
        <span id="loginBtnText">Login</span>
        <span id="loginBtnSpinner" class="btn-spinner hidden"></span>
      </button>

      <div class="divider"><span>OR</span></div>

      <button class="google-btn" id="googleBtn" type="button">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" class="google-icon"/>
        <span>Continue with Google</span>
      </button>

    </div>

    <!-- ===== SIGNUP FORM ===== -->
    <div id="signupForm" class="form-box hidden">

      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" id="signup-username" placeholder="Username" autocomplete="username"/>
      </div>

      <div class="input-group">
        <span class="input-icon">📧</span>
        <input type="email" id="signup-email" placeholder="Email" autocomplete="email"/>
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="signupPassword" placeholder="Password" autocomplete="new-password"/>
        <span class="eye-toggle" id="eyeSignup1">👁️</span>
      </div>

      <!-- Password strength -->
      <div class="strength-wrap" id="strengthWrap">
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <span class="strength-label" id="strengthLabel">Weak</span>
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" autocomplete="new-password"/>
        <span class="eye-toggle" id="eyeSignup2">👁️</span>
      </div>

      <div class="input-group">
        <span class="input-icon">🎟️</span>
        <input type="text" id="referralCode" placeholder="Referral Code (Optional)" autocomplete="off"/>
      </div>

      <div class="input-group">
        <span class="input-icon">📱</span>
        <input type="tel" id="signup-whatsapp" placeholder="WhatsApp Number (Optional)" autocomplete="tel"/>
      </div>

      <button class="primary-btn signup-btn" id="signupBtn" type="button">
        <span id="signupBtnText">Create Account ✨</span>
        <span id="signupBtnSpinner" class="btn-spinner hidden"></span>
      </button>

      <p class="terms-text">
        By signing up you agree to our
        <a href="about.html" class="terms-link">Terms &amp; Policies</a>
      </p>

    </div>
  </div>

  <p class="footer-text">🔒 Secure · Encrypted · Trusted by 1000+</p>

</div>

<script type="module">
import "./js/auth.js";

document.addEventListener("DOMContentLoaded", () => {

  /* ===== TABS ===== */
  const loginTab   = document.getElementById("loginTab");
  const signupTab  = document.getElementById("signupTab");
  const loginForm  = document.getElementById("loginForm");
  const signupForm = document.getElementById("signupForm");

  loginTab.onclick = () => {
    loginTab.classList.add("active");    signupTab.classList.remove("active");
    loginForm.classList.remove("hidden"); signupForm.classList.add("hidden");
    loginForm.classList.add("form-enter");
    setTimeout(() => loginForm.classList.remove("form-enter"), 350);
  };

  signupTab.onclick = () => {
    signupTab.classList.add("active");   loginTab.classList.remove("active");
    signupForm.classList.remove("hidden"); loginForm.classList.add("hidden");
    signupForm.classList.add("form-enter");
    setTimeout(() => signupForm.classList.remove("form-enter"), 350);
  };

  /* ===== BUTTONS ===== */
  document.getElementById("loginBtn").onclick  = () => window.loginUser();
  document.getElementById("signupBtn").onclick = () => window.signupUser();
  document.getElementById("googleBtn").onclick = () => window.googleLogin();

  /* ===== EYE TOGGLES ===== */
  [["eyeLogin","loginPassword"],["eyeSignup1","signupPassword"],["eyeSignup2","signupConfirmPassword"]]
    .forEach(([eId, iId]) => {
      const eye = document.getElementById(eId);
      if (!eye) return;
      eye.onclick = () => {
        const inp = document.getElementById(iId);
        if (!inp) return;
        inp.type = inp.type === "password" ? "text" : "password";
        eye.textContent = inp.type === "password" ? "👁️" : "🙈";
      };
    });

  /* ===== PASSWORD STRENGTH ===== */
  const pwd   = document.getElementById("signupPassword");
  const fill  = document.getElementById("strengthFill");
  const lbl   = document.getElementById("strengthLabel");
  const wrap  = document.getElementById("strengthWrap");

  if (pwd) {
    pwd.addEventListener("input", () => {
      const v = pwd.value;
      wrap.style.display = v.length > 0 ? "flex" : "none";
      let s = 0;
      if (v.length >= 6)          s++;
      if (v.length >= 10)         s++;
      if (/[A-Z]/.test(v))        s++;
      if (/[0-9]/.test(v))        s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      const lvls = [
        {p:"20%",c:"#ef4444",t:"Weak"},
        {p:"40%",c:"#f97316",t:"Fair"},
        {p:"60%",c:"#eab308",t:"Good"},
        {p:"80%",c:"#22c55e",t:"Strong"},
        {p:"100%",c:"#10b981",t:"Very Strong"},
      ];
      const l = lvls[Math.min(s,4)];
      fill.style.width = l.p; fill.style.background = l.c;
      lbl.textContent  = l.t; lbl.style.color = l.c;
    });
  }

  /* ===== INPUT FOCUS GLOW ===== */
  document.querySelectorAll(".input-group input").forEach(inp => {
    inp.addEventListener("focus", () => inp.closest(".input-group").classList.add("focused"));
    inp.addEventListener("blur",  () => inp.closest(".input-group").classList.remove("focused"));
  });

  /* ===== REFERRAL AUTO-FILL ===== */
  const ref = new URLSearchParams(window.location.search).get("ref");
  if (ref) {
    const inp = document.getElementById("referralCode");
